name: expense_budget_manager
description: Local-first offline personal finance & expense tracker (Arabic RTL + English).
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State + DI
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Persistence
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0
  shared_preferences: ^2.2.3

  # Immutability / models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # i18n / formatting
  intl: any

  # UI / charts / fonts
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  infinite_scroll_pagination: ^4.0.0
  dynamic_color: ^1.7.0

  # Background work + notifications
  workmanager: ^0.5.2
  flutter_local_notifications: ^17.2.1+2
  timezone: ^0.9.4

  # Files / export / share
  csv: ^6.0.0
  share_plus: ^9.0.0
  file_picker: ^8.0.6

  # Misc
  collection: ^1.18.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Codegen
  build_runner: ^2.4.11
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icons/
